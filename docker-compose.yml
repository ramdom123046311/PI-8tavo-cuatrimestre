version: "3.9"

services:

  laravel:
    build: ./laravel_app
    container_name: laravel_app
    ports:
      - "8000:8000"
    volumes:
      - ./laravel_app:/app

  fastapi:
    build: ./fastapi_app
    container_name: fastapi_app
    ports:
      - "8001:8001"
    volumes:
      - ./fastapi_app:/app

  flask:
    build: ./flask_app
    container_name: flask_app
    ports:
      - "5000:5000"
    volumes:
      - ./flask_app:/app
