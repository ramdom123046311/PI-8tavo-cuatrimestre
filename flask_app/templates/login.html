<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud Materna Juvenil - Iniciar Sesión</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body class="bg-pink-light font-nunito flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-xl shadow-sm w-full max-w-md border border-gray-100 p-8">

        <!-- Logo Header -->
        <div class="flex flex-col items-center mb-8">
            <div class="logo-icon text-white rounded-full flex items-center justify-center mb-4 bg-pink-primary">
                <i data-lucide="heart" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-semibold mb-1 text-pink-primary tracking-wide text-center">Salud Materna Juvenil
            </h1>
            <p class="text-gray-500 text-sm">Iniciar Sesión</p>
        </div>

        <!-- Login Form -->
        <form action="/patient/dashboard" method="GET" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">Email</label>
                <input type="email" placeholder="correo@ejemplo.com" required
                    class="w-full px-4 py-3 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm transition-all outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">Contraseña</label>
                <input type="password" placeholder="••••••••" required
                    class="w-full px-4 py-3 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm transition-all outline-none">
            </div>

            <button type="submit"
                class="w-full py-3 mt-4 rounded-lg text-white font-semibold transition-all hover:opacity-90 bg-pink-primary">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/registro" class="text-xs font-semibold hover:underline text-pink-primary transition-all">¿No
                tienes
                cuenta? Regístrate aquí</a>
        </div>

        <!-- Demo Accounts Box -->
        <div class="mt-8 p-5 rounded-xl text-xs text-gray-600 bg-pink-light">
            <p class="mb-3 font-semibold text-gray-700">Cuentas de demostración:</p>
            <div class="space-y-2">
                <p class="flex items-center gap-2">
                    <i data-lucide="user" class="w-4 h-4 text-purple-700"></i>
                    <span><strong>Paciente:</strong> paciente@demo.com / demo</span>
                </p>
                <p class="flex items-center gap-2">
                    <i data-lucide="user" class="w-4 h-4 text-yellow-600"></i>
                    <span><strong>Doctor:</strong> doctor@demo.com / demo</span>
                </p>
                <p class="flex items-center gap-2">
                    <i data-lucide="user" class="w-4 h-4 text-blue-500"></i>
                    <span><strong>Admin:</strong> admin@demo.com / demo</span>
                </p>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
