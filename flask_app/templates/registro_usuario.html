<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud Materna Juvenil - Registro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro_usuario.css') }}">
</head>

<body class="bg-pink-light font-nunito flex items-center justify-center min-h-screen p-4">

    <!-- Step 1: Role Selection -->
    <div id="role-selection"
        class="bg-white rounded-xl shadow-sm w-full max-w-md border border-gray-100 p-8 transition-all">
        <div class="flex flex-col items-center mb-8">
            <div class="logo-icon text-white rounded-full flex items-center justify-center mb-4 bg-pink-primary">
                <i data-lucide="heart" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-semibold mb-1 text-pink-primary tracking-wide text-center">Registro</h1>
            <p class="text-gray-500 text-sm">¿Eres médico?</p>
        </div>

        <div class="flex gap-4 mt-6">
            <button id="btn-medico"
                class="w-1/2 py-3 rounded-lg border-2 border-pink-200 text-gray-500 font-semibold transition-all hover:border-pink-primary hover:text-pink-primary flex flex-col items-center gap-2">
                <i data-lucide="stethoscope" class="w-6 h-6"></i>
                Sí, soy médico
            </button>
            <button id="btn-paciente"
                class="w-1/2 py-3 rounded-lg border-2 border-pink-200 text-gray-500 font-semibold transition-all hover:border-pink-primary hover:text-pink-primary flex flex-col items-center gap-2">
                <i data-lucide="user" class="w-6 h-6"></i>
                No, soy paciente
            </button>
        </div>

        <div class="mt-6 text-center">
            <a href="/login" class="text-xs font-semibold hover:underline text-pink-primary transition-all">¿Ya tienes
                cuenta? Inicia sesión</a>
        </div>
    </div>

    <!-- Modal Doctor -->
    <div id="modal-medico"
        class="fixed inset-0 bg-black bg-opacity-50 flex hidden items-center justify-center p-4 z-50">
        <div
            class="bg-white rounded-xl shadow-lg w-full max-w-lg border border-gray-100 p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">Registro de Médico</h2>
                <button type="button" class="btn-close-modal text-gray-500 hover:text-red-500"><i
                        data-lucide="x"></i></button>
            </div>
            <form id="form-medico" action="/login" method="GET" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                    <input type="text" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Cédula Profesional</label>
                    <input type="text" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Contraseña</label>
                    <input type="password" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Ciudad</label>
                    <input type="text" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Especialidad</label>
                    <input type="text" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Fotografía (URL o Archivo)</label>
                    <input type="file" accept="image/*"
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <button type="submit"
                    class="w-full py-3 mt-6 rounded-lg text-white font-semibold transition-all hover:opacity-90 bg-pink-primary">
                    Registrar Médico
                </button>
            </form>
        </div>
    </div>

    <!-- Modal Paciente -->
    <div id="modal-paciente"
        class="fixed inset-0 bg-black bg-opacity-50 flex hidden items-center justify-center p-4 z-50">
        <div
            class="bg-white rounded-xl shadow-lg w-full max-w-lg border border-gray-100 p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">Registro de Paciente</h2>
                <button type="button" class="btn-close-modal text-gray-500 hover:text-red-500"><i
                        data-lucide="x"></i></button>
            </div>
            <form action="/login" method="GET" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                    <input type="text" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">INE</label>
                    <input type="text" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Contraseña</label>
                    <input type="password" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Número de Contacto</label>
                    <input type="tel" required
                        class="w-full px-4 py-2 bg-gray-50 rounded-lg border-none focus:ring-2 focus:ring-pink-primary text-sm outline-none">
                </div>
                <button type="submit"
                    class="w-full py-3 mt-6 rounded-lg text-white font-semibold transition-all hover:opacity-90 bg-pink-primary">
                    Registrar Paciente
                </button>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="modal-success"
        class="fixed inset-0 bg-black bg-opacity-50 flex hidden items-center justify-center p-4 z-50">
        <div
            class="bg-white rounded-xl shadow-lg w-full max-w-md border border-gray-100 p-8 text-center animate-fade-in-up">
            <div
                class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6 text-green-500">
                <i data-lucide="check-circle" class="w-10 h-10"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">¡Gracias por registrarte!</h2>
            <p class="text-sm text-gray-600 mb-6">
                Solicitud de registro enviada, le informaremos su estatus con un mensaje al correo registrado.
            </p>
            <button id="btn-close-success"
                class="w-full py-3 rounded-lg bg-pink-primary text-white font-semibold transition-all hover:opacity-90">
                Entendido
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/registro_usuario.js') }}"></script>
</body>

</html>
