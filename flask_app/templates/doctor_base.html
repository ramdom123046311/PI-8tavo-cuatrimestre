{% extends "base.html" %}

{% block sidebar %}
<!-- Logo and Title -->
<div class="p-6 border-b" style="border-color: rgba(216, 27, 96, 0.1)">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full flex items-center justify-center p-2" style="background-color: #D81B60">
            <i data-lucide="heart" class="w-6 h-6 text-white"></i>
        </div>
        <div>
            <h2 class="text-lg" style="color: #D81B60">Salud Materna</h2>
            <p class="text-xs text-gray-600">Médico</p>
        </div>
    </div>
</div>

<!-- User Info -->
<div class="p-4 border-b" style="border-color: rgba(216, 27, 96, 0.1)">
    <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl" style="background-color: #FFF5F7">
            👨‍⚕️
        </div>
        <div class="flex-1 min-w-0">
            <p class="text-sm truncate" style="color: #D81B60">Dr. Gómez</p>
            <p class="text-xs text-gray-600 truncate">dr.gomez@example.com</p>
        </div>
    </div>
</div>

<!-- Navigation -->
<nav class="flex-1 p-4 overflow-y-auto">
    <ul class="space-y-1">
        <li>
            <a href="/doctor/dashboard"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-white"
                style="background-color: #D81B60">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="text-sm">Gestión de Citas</span>
            </a>
        </li>
        <li>
            <a href="/doctor/patients"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-50">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-sm">Mis Pacientes</span>
            </a>
        </li>
        <li>
            <a href="/doctor/chat"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-50">
                <i data-lucide="message-square" class="w-5 h-5"></i>
                <span class="text-sm">Mensajería</span>
            </a>
        </li>
        <li>
            <a href="/doctor/content"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-50">
                <i data-lucide="edit" class="w-5 h-5"></i>
                <span class="text-sm">Crear Contenido</span>
            </a>
        </li>
    </ul>
</nav>

<!-- Logout -->
<div class="p-4 border-t" style="border-color: rgba(216, 27, 96, 0.1)">
    <button class="w-full rounded-lg py-2 flex justify-center items-center border hover:bg-red-50"
        style="border-color: #D81B60; color: #D81B60">
        <i data-lucide="log-out" class="w-4 h-4 mr-2"></i>
        Cerrar Sesión
    </button>
</div>
{% endblock %}
